# Golang CI configuration file
# Check https://golangci-lint.run/docs/configuration/file/
version: "2"
run:
  timeout: 5m

linters:
  default: standard
  settings:
    gocyclo:
      min-complexity: 20
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln

formatters:
  enable:
    - gofumpt
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - blank
        - prefix(github.com/brpaz/gh-secrets-sync)
        - blank
        - dot
        - alias
        - localmodule
