---
name: Bug Report
about: Report something that isn't working as expected
title: "[Bug] "
labels: bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the issue
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: e.g., macOS 14.0, Ubuntu 22.04
  - type: input
    id: versions
    attributes:
      label: Tool versions
      description: e.g., node v20, cargo 1.70
  - type: textarea
    id: context
    attributes:
      label: Additional Context