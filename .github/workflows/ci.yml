name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  release:
    types: [published]

env:
  GOLANGCI_VERSION: v2.5.0
  GOTESTSUM_VERSION: v1.13.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: ${{ env.GOLANGCI_VERSION }}

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Setup gotestsum
        uses: autero1/action-gotestsum@v2.0.0
        with:
          gotestsum_version: ${{ env.GOTESTSUM_VERSION }}

      - name: Run tests
        id: test-run
        continue-on-error: true
        run: |
          mkdir -p reports
          gotestsum \
            --format testname \
            --junitfile reports/test-result.xml \
            --jsonfile reports/test-result.json \
              --  -coverprofile=reports/coverage.out -covermode=atomic ./...

      - name: Upload test results artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/

      - uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        with:
          fail_ci_if_error: false
          files: ./reports/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (for multi-arch build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Build Metadata
        id: build_metadata
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> $GITHUB_ENV

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "GITHUB_SHA_SHORT=$SHORT_SHA" >> $GITHUB_ENV

          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

          VERSION_VAR="$SHORT_SHA" # Default to short SHA
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION_VAR="${{ github.event.release.tag_name }}"
          fi
          echo "VERSION=$VERSION_VAR" >> $GITHUB_ENV

          echo TEST_IMAGE_TAG="${IMAGE_NAME}:test-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=sha,format=short
            

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VERSION=${{ env.VERSION }}
            VCS_REF=${{ github.sha }}
          tags: ${{ env.TEST_IMAGE_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          push: false
          load: true

      

      - name: Final Build and Push to Registry
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VERSION=${{ env.VERSION }}
            VCS_REF=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          sbom: true
          provenance: mode=max

  build-binary:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

    - name: Run GoReleaser (snapshot)
      uses: goreleaser/goreleaser-action@v6
      if: github.event_name != 'release'
      with:
        args: release --clean --snapshot
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run GoReleaser (release)
      uses: goreleaser/goreleaser-action@v6
      if: github.event_name == 'release'
      with:
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifacts
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v5
      with:
        name: build-artifacts
        path: dist/*
        retention-days: 7


